name: Deploy Vite App to GitHub Pages

on:
  push:
    branches: [ "main" ] # Runs automatically on every push to main

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Use Node.js 20.x
      uses: actions/setup-node@v4
      with:
        node-version: 20.x
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci # Safely installs exact versions from your package-lock.json

    - name: Build Project
      run: npm run build # Executes your vite build command

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload Build Artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: './dist' # Targets Vite's production output directory

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
